
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1923"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Chem Safety"/>
<title>Chemical Safety</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #0f1923;
  --black2: #1a2633;
  --black3: #243040;
  --white: #f5f7f9;
  --white2: #dde3ea;
  --white3: #a8b4c0;
  --red: #e63946;
  --red-dark: #b02030;
  --red-bg: #1f0a0c;
  --red-light: #ff6b74;
  --amber: #f4a629;
  --amber-bg: #1f1508;
  --green: #3dba6f;
  --green-bg: #081a0f;
  --blue: #4a9eff;
  --blue-bg: #071624;
  --condensed: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--body); background: var(--black); color: var(--white); min-height: 100dvh; line-height: 1.5; }

.header {
  background: var(--black);
  border-bottom: 2px solid var(--red);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-family: var(--condensed); font-size: 22px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; }
.header-sub { font-size: 11px; color: var(--white3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.poison-btn {
  background: var(--red); color: #fff;
  font-family: var(--condensed); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 8px 14px; border-radius: 4px; text-decoration: none; white-space: nowrap; transition: background 0.15s;
}
.poison-btn:hover { background: var(--red-dark); }

.emerg-bar {
  background: var(--red-bg); border-bottom: 1px solid var(--red-dark);
  padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.emerg-label { font-family: var(--condensed); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red-light); }
.emerg-links { display: flex; gap: 8px; flex-wrap: wrap; }
.emerg-link { font-size: 13px; font-weight: 600; color: var(--red-light); text-decoration: none; border: 1px solid var(--red-dark); border-radius: 4px; padding: 4px 10px; background: rgba(230,57,70,0.1); }

.main { max-width: 640px; margin: 0 auto; padding: 14px 14px 40px; }

.tabs { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--black3); border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
.tab-btn { padding: 12px; font-family: var(--condensed); font-size: 15px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: var(--black2); border: none; border-right: 1px solid var(--black3); cursor: pointer; color: var(--white3); transition: all 0.15s; }
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: var(--black3); color: var(--white); }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-input { width: 100%; padding: 14px 46px 14px 16px; font-family: var(--body); font-size: 16px; font-weight: 500; background: var(--black2); border: 1.5px solid var(--black3); border-radius: 6px; color: var(--white); outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--white3); }
.search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--white3); font-size: 20px; pointer-events: none; }

.status-bar { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--white3); margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.sdot.ok { background: var(--green); }
.sdot.err { background: var(--red); }

.result-card { background: var(--black2); border: 1px solid var(--black3); border-left: 4px solid var(--black3); border-radius: 6px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
.result-card:active { background: var(--black3); }
.result-card.sig-danger { border-left-color: var(--red); }
.result-card.sig-warning { border-left-color: var(--amber); }
.result-card.sig-caution { border-left-color: var(--green); }
.result-name { font-family: var(--condensed); font-size: 19px; font-weight: 700; letter-spacing: 0.02em; color: var(--white); line-height: 1.2; margin-bottom: 3px; }
.result-meta { font-size: 12px; color: var(--white3); line-height: 1.4; }
.result-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.result-arrow { color: var(--white3); font-size: 24px; font-weight: 300; }

.badge { font-family: var(--condensed); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 9px; border-radius: 3px; white-space: nowrap; }
.badge-DANGER { background: var(--red-bg); color: var(--red-light); border: 1px solid var(--red-dark); }
.badge-WARNING { background: var(--amber-bg); color: var(--amber); border: 1px solid #5a3a00; }
.badge-CAUTION { background: var(--green-bg); color: var(--green); border: 1px solid #1a5030; }

.back-btn { background: none; border: none; font-family: var(--condensed); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--white3); cursor: pointer; padding: 0 0 14px; display: flex; align-items: center; gap: 6px; }
.back-btn:hover { color: var(--white); }

.detail-name { font-family: var(--condensed); font-size: 30px; font-weight: 800; letter-spacing: 0.02em; text-transform: uppercase; line-height: 1.1; margin-bottom: 4px; }
.detail-ai { font-size: 13px; color: var(--white3); margin-bottom: 12px; }
.detail-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 3px; background: var(--black3); color: var(--white2); border: 1px solid #2e3d50; }
.pill-rup { background: var(--red-bg); color: var(--red-light); border-color: var(--red-dark); }

.sec-label { font-family: var(--condensed); font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white3); margin-bottom: 10px; }

.fa-block { background: var(--red-bg); border: 1px solid var(--red-dark); border-left: 4px solid var(--red); border-radius: 6px; padding: 14px; margin-bottom: 12px; }
.fa-block .sec-label { color: var(--red-light); margin-bottom: 12px; }
.fa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.fa-item { background: rgba(0,0,0,0.35); border: 1px solid var(--red-dark); border-radius: 4px; padding: 10px 12px; }
.fa-type { font-family: var(--condensed); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red-light); margin-bottom: 5px; }
.fa-text { font-size: 13px; color: #f0c0c2; line-height: 1.5; }

.info-block { background: var(--black2); border: 1px solid var(--black3); border-radius: 6px; padding: 14px; margin-bottom: 10px; }
.ppe-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.ppe-pill { font-size: 13px; font-weight: 500; padding: 5px 12px; border-radius: 4px; background: var(--blue-bg); color: var(--blue); border: 1px solid #1a3a5a; }

.comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(85px, 1fr)); gap: 8px; }
.comp-box { background: var(--black3); border-radius: 4px; padding: 10px; text-align: center; }
.comp-val { font-family: var(--condensed); font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 3px; line-height: 1.2; }
.comp-lbl { font-size: 10px; color: var(--white3); letter-spacing: 0.06em; text-transform: uppercase; }
.info-text { font-size: 14px; color: var(--white2); line-height: 1.6; }

.sds-row { display: flex; flex-wrap: wrap; gap: 8px; }
.sds-link { font-family: var(--condensed); font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 9px 16px; border-radius: 4px; border: 1px solid var(--black3); color: var(--blue); text-decoration: none; background: var(--blue-bg); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--white3); font-size: 14px; line-height: 1.8; }
.empty-emerg { display: block; margin-top: 12px; font-family: var(--condensed); font-size: 22px; font-weight: 800; letter-spacing: 0.04em; color: var(--red-light); }

.offline-banner { background: var(--amber-bg); border: 1px solid #5a3a00; border-radius: 4px; padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--amber); margin-bottom: 12px; display: none; }

.manage-card { background: var(--black2); border: 1px solid var(--black3); border-radius: 6px; padding: 16px; margin-bottom: 12px; }
.manage-title { font-family: var(--condensed); font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--white2); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--black3); }
.notice { font-size: 12px; color: var(--white3); background: var(--black3); border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; line-height: 1.5; }
.form-grid { display: grid; gap: 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-family: var(--condensed); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white3); }
.form-grid input, .form-grid select, .form-grid textarea { width: 100%; padding: 10px 12px; font-family: var(--body); font-size: 14px; background: var(--black); border: 1.5px solid var(--black3); border-radius: 4px; color: var(--white); outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
.form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus { border-color: var(--blue); }
.form-grid textarea { height: 64px; resize: none; }
.save-btn { padding: 12px 24px; background: var(--blue); color: var(--black); border: none; border-radius: 4px; font-family: var(--condensed); font-size: 16px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 4px; }

.inv-wrap { overflow-x: auto; }
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { text-align: left; padding: 7px 8px; font-family: var(--condensed); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white3); border-bottom: 1px solid var(--black3); }
.inv-table td { padding: 10px 8px; border-bottom: 1px solid var(--black3); vertical-align: middle; color: var(--white2); }
.inv-table tr:last-child td { border-bottom: none; }
.del-btn { font-family: var(--condensed); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--red-light); border: 1px solid var(--red-dark); background: none; border-radius: 3px; padding: 4px 8px; cursor: pointer; }

@media (max-width: 480px) {
  .row2, .row3 { grid-template-columns: 1fr; }
  .fa-grid { grid-template-columns: 1fr 1fr; }
  .detail-name { font-size: 26px; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title">Chemical Safety</div>
    <div class="header-sub">Pest Control Reference</div>
  </div>
  <a class="poison-btn" href="tel:18002221222">⚠ Poison Control</a>
</header>

<div class="emerg-bar">
  <span class="emerg-label">Emergency</span>
  <div class="emerg-links">
    <a class="emerg-link" href="tel:18002221222">1-800-222-1222</a>
    <a class="emerg-link" href="tel:911">911</a>
    <a class="emerg-link" href="https://npic.orst.edu" target="_blank">NPIC</a>
  </div>
</div>

<div class="main">
  <div id="offline-banner" class="offline-banner">⚠ Offline — showing cached data</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">Search</button>
    <button class="tab-btn" onclick="switchTab('manage')">Manage</button>
  </div>

  <div id="tab-search">
    <div class="search-wrap">
      <input class="search-input" type="text" id="search-input"
        placeholder="Product, ingredient, or EPA reg. no."
        oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <span class="search-icon">🔍</span>
    </div>
    <div class="status-bar">
      <span class="sdot" id="status-dot"></span>
      <span id="status-text">Loading...</span>
    </div>
    <div id="results-area"></div>
    <div id="detail-area" style="display:none"></div>
  </div>

  <div id="tab-manage" style="display:none">
    <div class="manage-card">
      <div class="manage-title">Add product</div>
      <div class="notice">Fields marked * appear prominently in emergency and inspection views.</div>
      <div class="form-grid">
        <div class="row2">
          <div class="form-field"><label class="form-label">Product name *</label><input type="text" id="f-name" placeholder="e.g. Talstar P"/></div>
          <div class="form-field"><label class="form-label">Active ingredient *</label><input type="text" id="f-ai" placeholder="e.g. Bifenthrin 7.9%"/></div>
        </div>
        <div class="row3">
          <div class="form-field"><label class="form-label">EPA Reg. No. *</label><input type="text" id="f-epa" placeholder="279-3206"/></div>
          <div class="form-field"><label class="form-label">Signal word</label>
            <select id="f-signal"><option value="DANGER">DANGER</option><option value="WARNING" selected>WARNING</option><option value="CAUTION">CAUTION</option></select>
          </div>
          <div class="form-field"><label class="form-label">Tox. category</label>
            <select id="f-tox"><option value="I">I</option><option value="II" selected>II</option><option value="III">III</option><option value="IV">IV</option></select>
          </div>
        </div>
        <div class="row2">
          <div class="form-field"><label class="form-label">Target pests</label><input type="text" id="f-pests" placeholder="Ants, cockroaches..."/></div>
          <div class="form-field"><label class="form-label">PPE required *</label><input type="text" id="f-ppe" placeholder="Gloves, goggles..."/></div>
        </div>
        <div class="row3">
          <div class="form-field"><label class="form-label">First aid — skin *</label><textarea id="f-fa-skin" placeholder="Wash with soap and water 15-20 min."></textarea></div>
          <div class="form-field"><label class="form-label">First aid — eyes *</label><textarea id="f-fa-eye" placeholder="Flush with water 15-20 min."></textarea></div>
          <div class="form-field"><label class="form-label">First aid — inhaled *</label><textarea id="f-fa-inhale" placeholder="Move to fresh air..."></textarea></div>
        </div>
        <div class="row2">
          <div class="form-field"><label class="form-label">Storage</label><textarea id="f-storage" placeholder="Store in original container..."></textarea></div>
          <div>
            <div class="form-field" style="margin-bottom:8px"><label class="form-label">REI</label><input type="text" id="f-rei" placeholder="e.g. 4 hours"/></div>
            <div class="form-field"><label class="form-label">Restricted use?</label>
              <select id="f-ru"><option value="No">No — General use</option><option value="Yes">Yes — RUP</option></select>
            </div>
          </div>
        </div>
        <div class="form-field"><label class="form-label">SDS URL</label><input type="text" id="f-sds" placeholder="https://..."/></div>
        <div><button class="save-btn" onclick="saveProduct()">Save to inventory</button></div>
      </div>
    </div>
    <div class="manage-card">
      <div class="manage-title">Current inventory</div>
      <div id="manage-list"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const stored = localStorage.getItem('auth');
  if(stored !== 'PestcoFL') {
    document.body.innerHTML = `
      <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0f1923;padding:20px">
        <div style="width:100%;max-width:340px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:#f5f7f9;margin-bottom:4px">Chemical Safety</div>
          <div style="font-size:12px;color:#a8b4c0;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:32px">Pest Control Reference</div>
          <input id="pw-input" type="password" placeholder="Enter password"
            style="width:100%;padding:14px 16px;font-size:16px;background:#1a2633;border:1.5px solid #243040;border-radius:6px;color:#f5f7f9;outline:none;margin-bottom:10px;-webkit-appearance:none;font-family:Barlow,sans-serif"
            onkeydown="if(event.key==='Enter')checkPw()"/>
          <button onclick="checkPw()"
            style="width:100%;padding:14px;background:#e63946;color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer">
            Sign in
          </button>
          <div id="pw-err" style="color:#ff6b74;font-size:13px;margin-top:10px;text-align:center;display:none">Incorrect password</div>
        </div>
      </div>`;
    window.checkPw = function(){
      const val = document.getElementById('pw-input').value;
      if(val === 'PestcoFL'){
        localStorage.setItem('auth','PestcoFL');
        location.reload();
      } else {
        document.getElementById('pw-err').style.display='block';
      }
    };
    throw new Error('auth');
  }
})();
const SHEET_URL = '/api/sheet';
const CACHE_KEY = 'pestchem_cache';
const LOCAL_KEY = 'pestchem_local';
let sheetProducts = [];
let localProducts = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]');
function allProducts() { return [...sheetProducts, ...localProducts]; }

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
  const find = (h, alts) => { const keys=[h,...(alts||[])]; for(const k of keys){const i=headers.findIndex(x=>x===k||x.includes(k));if(i>=0)return i;} return -1; };
  const col = {
    name: find('product name',['name','product']), ai: find('active ingredient',['active','ingredient','ai']),
    epa: find('epa reg',['epa','reg no','registration']), signal: find('signal word',['signal']),
    tox: find('tox category',['tox','toxicity','category']), pests: find('target pest',['pest','target']),
    ppe: find('ppe',['protective','equipment']), fa_skin: find('fa skin',['skin','first aid skin']),
    fa_eye: find('fa eye',['eye','eyes','first aid eye']), fa_inhale: find('fa inhale',['inhale','inhalation','first aid inhale']),
    storage: find('storage',['store','handling']), rei: find('rei',['re-entry','reentry']),
    ru: find('restricted use',['restricted','rup']), sds: find('sds url',['sds','sds link','sds_url'])
  };
  return lines.slice(1).map((line,idx)=>{
    const cells = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||line.split(',');
    const c = i=>(cells[i]||'').replace(/^"|"$/g,'').trim();
    const name = col.name>=0?c(col.name):'';
    if(!name) return null;
    return { id:'sheet_'+idx, name, ai:col.ai>=0?c(col.ai):'', epa:col.epa>=0?c(col.epa):'',
      signal:(col.signal>=0?c(col.signal):'CAUTION').toUpperCase()||'CAUTION',
      tox:col.tox>=0?c(col.tox):'III', pests:col.pests>=0?c(col.pests):'',
      ppe:col.ppe>=0?c(col.ppe):'',
      fa:{skin:col.fa_skin>=0?c(col.fa_skin):'',eye:col.fa_eye>=0?c(col.fa_eye):'',inhale:col.fa_inhale>=0?c(col.fa_inhale):''},
      storage:col.storage>=0?c(col.storage):'', rei:col.rei>=0?c(col.rei):'',
      ru:col.ru>=0?c(col.ru):'No', sds:col.sds>=0?c(col.sds):'', fromSheet:true };
  }).filter(Boolean);
}

async function loadSheet() {
  const dot=document.getElementById('status-dot'), statusEl=document.getElementById('status-text');
  try {
    const res=await fetch(SHEET_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    sheetProducts=parseCSV(text);
    localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:sheetProducts}));
    dot.className='sdot ok';
    statusEl.textContent=sheetProducts.length+' products loaded';
    showDefaultSearch();
  } catch(e) {
    const cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
    if(cached){sheetProducts=cached.data;dot.className='sdot';const ago=Math.round((Date.now()-cached.ts)/60000);statusEl.textContent='Offline — cached '+ago+' min ago';document.getElementById('offline-banner').style.display='block';}
    else{dot.className='sdot err';statusEl.textContent='Could not load — check connection';}
    showDefaultSearch();
  }
}

function sigClass(s){if(s==='DANGER')return 'sig-danger';if(s==='WARNING')return 'sig-warning';return 'sig-caution';}

function showDefaultSearch(){
  const total=allProducts().length;
  document.getElementById('results-area').innerHTML=`<div class="empty-state">${total} products in inventory.<br>Search by name, active ingredient, or EPA reg. no.<span class="empty-emerg">Emergency: 1-800-222-1222</span></div>`;
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('detail-area').style.display='none';
  const ra=document.getElementById('results-area');
  ra.style.display='block';
  if(!q){showDefaultSearch();return;}
  const matches=allProducts().filter(p=>p.name.toLowerCase().includes(q)||(p.ai||'').toLowerCase().includes(q)||(p.epa||'').toLowerCase().includes(q)||(p.pests||'').toLowerCase().includes(q));
  if(!matches.length){ra.innerHTML=`<div class="empty-state">No products found for "<strong>${q}</strong>".<br><a class="sds-link" style="margin-top:12px;display:inline-block" href="https://www.epa.gov/pesticide-registration/pesticide-product-label-system-ppls" target="_blank">Search EPA PPLS →</a></div>`;return;}
  ra.innerHTML=matches.map(p=>`<div class="result-card ${sigClass(p.signal)}" onclick="showDetail('${p.id}')">
    <div style="min-width:0"><div class="result-name">${p.name}</div><div class="result-meta">${[p.ai,p.epa?'EPA '+p.epa:''].filter(Boolean).join(' · ')}</div></div>
    <div class="result-right"><span class="badge badge-${p.signal||'CAUTION'}">${p.signal||'CAUTION'}</span><span class="result-arrow">›</span></div>
  </div>`).join('');
}

function showDetail(id){
  const p=allProducts().find(x=>x.id===id);
  if(!p) return;
  document.getElementById('results-area').style.display='none';
  const det=document.getElementById('detail-area');
  det.style.display='block';
  const ppePills=(p.ppe||'').split(',').map(s=>s.trim()).filter(Boolean).map(s=>`<span class="ppe-pill">${s}</span>`).join('');
  det.innerHTML=`
    <button class="back-btn" onclick="backToSearch()">← Back</button>
    <div class="detail-name">${p.name}</div>
    <div class="detail-ai">${p.ai||''}</div>
    <div class="detail-pills">
      <span class="badge badge-${p.signal||'CAUTION'}">${p.signal||'CAUTION'}</span>
      ${p.epa?`<span class="pill">EPA ${p.epa}</span>`:''}
      ${p.tox?`<span class="pill">Cat. ${p.tox}</span>`:''}
      ${p.rei?`<span class="pill">REI ${p.rei}</span>`:''}
      ${p.ru==='Yes'?'<span class="pill pill-rup">Restricted Use</span>':''}
    </div>
    <div class="fa-block">
      <div class="sec-label">⚠ First aid — emergency response</div>
      <div class="fa-grid">
        <div class="fa-item"><div class="fa-type">Skin</div><div class="fa-text">${p.fa?.skin||'See product label.'}</div></div>
        <div class="fa-item"><div class="fa-type">Eyes</div><div class="fa-text">${p.fa?.eye||'See product label.'}</div></div>
        <div class="fa-item"><div class="fa-type">Inhalation</div><div class="fa-text">${p.fa?.inhale||'See product label.'}</div></div>
        <div class="fa-item"><div class="fa-type">Ingestion</div><div class="fa-text">Do NOT induce vomiting. Call Poison Control 1-800-222-1222 or 911 immediately.</div></div>
      </div>
    </div>
    ${ppePills?`<div class="info-block"><div class="sec-label">PPE required</div><div class="ppe-pills">${ppePills}</div></div>`:''}
    <div class="info-block">
      <div class="sec-label">Compliance</div>
      <div class="comp-grid">
        <div class="comp-box"><div class="comp-val">${p.epa||'—'}</div><div class="comp-lbl">EPA Reg.</div></div>
        <div class="comp-box"><div class="comp-val">${p.signal||'—'}</div><div class="comp-lbl">Signal</div></div>
        <div class="comp-box"><div class="comp-val">Cat. ${p.tox||'—'}</div><div class="comp-lbl">Toxicity</div></div>
        <div class="comp-box"><div class="comp-val">${p.rei||'—'}</div><div class="comp-lbl">REI</div></div>
        <div class="comp-box"><div class="comp-val">${p.ru==='Yes'?'RUP':'General'}</div><div class="comp-lbl">Use class</div></div>
      </div>
    </div>
    ${p.pests?`<div class="info-block"><div class="sec-label">Target pests</div><div class="info-text">${p.pests}</div></div>`:''}
    ${p.storage?`<div class="info-block"><div class="sec-label">Storage &amp; handling</div><div class="info-text">${p.storage}</div></div>`:''}
    <div class="info-block">
      <div class="sec-label">Label &amp; SDS</div>
      <div class="sds-row">
        ${p.sds?`<a class="sds-link" href="${p.sds}" target="_blank">View SDS →</a>`:''}
        <a class="sds-link" href="https://www.epa.gov/pesticide-registration/pesticide-product-label-system-ppls" target="_blank">EPA PPLS →</a>
        <a class="sds-link" href="https://npic.orst.edu" target="_blank">NPIC →</a>
      </div>
    </div>`;
}

function backToSearch(){
  document.getElementById('detail-area').style.display='none';
  document.getElementById('results-area').style.display='block';
}

function switchTab(t){
  document.getElementById('tab-search').style.display=t==='search'?'block':'none';
  document.getElementById('tab-manage').style.display=t==='manage'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((el,i)=>el.classList.toggle('active',(t==='search'&&i===0)||(t==='manage'&&i===1)));
  if(t==='manage') renderManage();
}

function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Product name is required.');return;}
  const p={id:'local_'+Date.now(),name,ai:document.getElementById('f-ai').value.trim(),epa:document.getElementById('f-epa').value.trim(),signal:document.getElementById('f-signal').value,tox:document.getElementById('f-tox').value,pests:document.getElementById('f-pests').value.trim(),ppe:document.getElementById('f-ppe').value.trim(),fa:{skin:document.getElementById('f-fa-skin').value.trim(),eye:document.getElementById('f-fa-eye').value.trim(),inhale:document.getElementById('f-fa-inhale').value.trim()},storage:document.getElementById('f-storage').value.trim(),rei:document.getElementById('f-rei').value.trim(),ru:document.getElementById('f-ru').value,sds:document.getElementById('f-sds').value.trim(),fromSheet:false};
  localProducts.push(p);
  localStorage.setItem(LOCAL_KEY,JSON.stringify(localProducts));
  ['f-name','f-ai','f-epa','f-ppe','f-pests','f-fa-skin','f-fa-eye','f-fa-inhale','f-storage','f-rei','f-sds'].forEach(id=>document.getElementById(id).value='');
  renderManage();
  alert(name+' saved.');
}

function deleteProduct(id){
  if(!confirm('Remove this product?')) return;
  localProducts=localProducts.filter(p=>p.id!==id);
  localStorage.setItem(LOCAL_KEY,JSON.stringify(localProducts));
  renderManage();
}

function renderManage(){
  const el=document.getElementById('manage-list');
  const all=allProducts();
  if(!all.length){el.innerHTML='<div style="font-size:13px;color:var(--white3)">No products in inventory.</div>';return;}
  el.innerHTML=`<div style="font-size:11px;color:var(--white3);margin-bottom:10px;letter-spacing:0.06em;text-transform:uppercase">${sheetProducts.length} from sheet · ${localProducts.length} local</div>
  <div class="inv-wrap"><table class="inv-table">
    <thead><tr><th>Product</th><th>Signal</th><th>RUP</th><th></th></tr></thead>
    <tbody>
      ${sheetProducts.map(p=>`<tr><td><strong style="color:var(--white)">${p.name}</strong><br><span style="font-size:11px;color:var(--white3)">${p.ai||''}</span></td><td><span class="badge badge-${p.signal||'CAUTION'}">${p.signal||'—'}</span></td><td style="color:var(--white3)">${p.ru==='Yes'?'Yes':'No'}</td><td><span style="font-size:11px;color:var(--white3)">sheet</span></td></tr>`).join('')}
      ${localProducts.map(p=>`<tr><td><strong style="color:var(--white)">${p.name}</strong><br><span style="font-size:11px;color:var(--white3)">${p.ai||''}</span></td><td><span class="badge badge-${p.signal||'CAUTION'}">${p.signal||'—'}</span></td><td style="color:var(--white3)">${p.ru==='Yes'?'Yes':'No'}</td><td><button class="del-btn" onclick="deleteProduct('${p.id}')">Remove</button></td></tr>`).join('')}
    </tbody>
  </table></div>`;
}

window.addEventListener('online',()=>{document.getElementById('offline-banner').style.display='none';loadSheet();});
window.addEventListener('offline',()=>{document.getElementById('offline-banner').style.display='block';});
loadSheet();
</script>
</body>
</html>
